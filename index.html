<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health First</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Health First</h1>
        <p>Offline-First Clinic Prototype</p>
    </header>
    <main class="container">
        <section class="card inventory-section">
            <h2>Medicine Stock Levels</h2>
            <div class="stock-display">
                <p>Antimalarials (Doses left): <strong id="stock-count">50</strong></p>
                <p id="stock-alert" class="alert hidden">⚠️ LOW STOCK ALERT: Replenishment needed!</p>
            </div>
        </section>
        <section class="card form-section">
            <h2>Log Patient Visit</h2>
            <form id="patient-form">
                <div class="form-group">
                    <label for="patient-name">Patient Name:</label>
                    <input type="text" id="patient-name" required placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label for="treatment">Treatment Administered:</label>
                    <select id="treatment" required>
                        <option value="">-- Select Treatment --</option>
                        <option value="antimalarial">Antimalarial Dose (Subtracts 1 from stock)</option>
                        <option value="general">General Checkup (No medicine given)</option>
                    </select>
                </div>
                <button type="submit" class="btn">Log Patient & Update Stock</button>
            </form>
        </section>
        <section class="card log-section">
            <h2>Today's Patient Log</h2>
            <ul id="patient-list">
                </ul>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
